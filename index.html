<script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzaUCyT9DyKk5JUtXcHfd2-RxihwlljM47XEqNQ-ftF34cEhlgx2GI8IUPlxUIyJHBJYQ/exec";

async function fetchAndRenderSlots(day = "Hôm nay") {
    try {
        const response = await fetch(`${SCRIPT_URL}?day=${encodeURIComponent(day)}`);
        const data = await response.json();

        // Xóa dữ liệu cũ trong các grid
        const morningGrid = document.getElementById('morning-grid');
        const afternoonGrid = document.getElementById('afternoon-grid');
        morningGrid.innerHTML = "";
        afternoonGrid.innerHTML = "";

        // Hàm tạo nút bấm (tái sử dụng)
        const createButton = (slot) => {
            const isFull = slot.available <= 0;
            const btn = document.createElement('button');
            btn.className = isFull 
                ? "flex flex-col items-center py-3 bg-surface-container-high/40 rounded-xl opacity-60 cursor-not-allowed"
                : "flex flex-col items-center py-3 bg-white rounded-xl shadow-sm border border-transparent active:scale-95 transition-all ring-1 ring-black/5 hover:ring-primary";
            
            if (isFull) btn.disabled = true;
            
            btn.innerHTML = `
                <span class="font-bold text-base ${isFull ? 'text-outline' : 'text-on-surface'}">${slot.time}</span>
                <span class="text-[10px] font-medium ${isFull ? 'text-outline' : 'text-primary'}">
                    ${isFull ? 'Hết chỗ' : slot.available + ' chỗ'}
                </span>
            `;
            
            btn.onclick = () => alert("Bạn chọn: " + slot.time);
            return btn;
        };

        // Đổ dữ liệu vào đúng "Ca"
        data["Sáng"].forEach(slot => morningGrid.appendChild(createButton(slot)));
        data["Chiều"].forEach(slot => afternoonGrid.appendChild(createButton(slot)));

    } catch (error) {
        console.error("Lỗi:", error);
    }
}
// Chạy khởi tạo
fetchAndRenderSlots();
</script>
