<script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbw5kuaGGVgR-sxFc4bbVgwUFjE5kgzGMw5PBz3XkynlehsIs_fx6Y0luDOmh8CmCH2xvQ/exec";
let currentSelectedDate = "";
let selectedTimeSlot = ""; // Lưu khung giờ như "08:30"

function formatDateString(date) {
    const d = String(date.getDate()).padStart(2, '0');
    const m = String(date.getMonth() + 1).padStart(2, '0');
    const y = date.getFullYear();
    return `${d}/${m}/${y}`;
}

function formatDisplayDate(date) {
    const d = String(date.getDate()).padStart(2, '0');
    const m = String(date.getMonth() + 1).padStart(2, '0');
    return `${d}/${m}`;
}

// Tính toán lấy mốc thời gian Hôm nay và Ngày mai
const todayDate = new Date();
const tomorrowDate = new Date();
tomorrowDate.setDate(tomorrowDate.getDate() + 1); // Cộng thêm 1 ngày

const todayStr = formatDateString(todayDate);       // Kết quả: VD "30/03/2026"
const tomorrowStr = formatDateString(tomorrowDate); // Kết quả: VD "31/03/2026"

// Khởi tạo giao diện khi trang web load xong
document.addEventListener("DOMContentLoaded", () => {
    const btnToday = document.getElementById("btn-today");
    const btnTomorrow = document.getElementById("btn-tomorrow");

    // 1. Điền text hiển thị lên nút
    btnToday.innerText = `Hôm nay, ${formatDisplayDate(todayDate)}`;
    btnTomorrow.innerText = `Ngày mai, ${formatDisplayDate(tomorrowDate)}`;

    // 2. Gắn sự kiện click cho 2 nút
    btnToday.onclick = () => selectDay(todayStr, btnToday);
    btnTomorrow.onclick = () => selectDay(tomorrowStr, btnTomorrow);

    // 3. Mặc định kích hoạt nút "Hôm nay" khi mới vào web
    selectDay(todayStr, btnToday); 
});

// Hàm xử lý khi bấm vào nút ngày
function selectDay(dateStr, clickedButton) {
    currentSelectedDate = dateStr;

    // Đổi màu tất cả các nút về trạng thái xám (chưa chọn)
    const allButtons = document.querySelectorAll('.date-btn');
    allButtons.forEach(btn => {
        btn.className = "date-btn flex-shrink-0 px-4 py-2 bg-surface-container-high text-on-surface rounded-full text-sm font-medium transition-all";
    });
    
    // Đổi màu nút vừa được click thành xanh (đã chọn)
    clickedButton.className = "date-btn flex-shrink-0 px-4 py-2 bg-primary text-white rounded-full text-sm font-bold shadow-sm transition-all";

    // Hiển thị trạng thái "Đang tải" trong lúc chờ mạng
    const morningGrid = document.getElementById('morning-grid');
    const afternoonGrid = document.getElementById('afternoon-grid');
    if(morningGrid) morningGrid.innerHTML = "<p class='col-span-3 text-center text-[10px] text-outline'>Đang tải...</p>";
    if(afternoonGrid) afternoonGrid.innerHTML = "<p class='col-span-3 text-center text-[10px] text-outline'>Đang tải...</p>";

    // Gọi API lấy dữ liệu khung giờ của ngày được chọn
    fetchAndRenderSlots(dateStr);
}
        
async function fetchAndRenderSlots(day = "Hôm nay") {
    try {
        const response = await fetch(`${SCRIPT_URL}?day=${encodeURIComponent(day)}`);
        const data = await response.json();

        // Xóa dữ liệu cũ trong các grid
        const morningGrid = document.getElementById('morning-grid');
        const afternoonGrid = document.getElementById('afternoon-grid');
        morningGrid.innerHTML = "";
        afternoonGrid.innerHTML = "";

        // Hàm tạo nút bấm (tái sử dụng)
        const createButton = (slot) => {
            const isFull = slot.available <= 0;
            const btn = document.createElement('button');
            btn.className = isFull 
                ? "flex flex-col items-center py-3 bg-surface-container-high/40 rounded-xl opacity-60 cursor-not-allowed"
                : "flex flex-col items-center py-3 bg-white rounded-xl shadow-sm border border-transparent active:scale-95 transition-all ring-1 ring-black/5 hover:ring-primary";
            
            if (isFull) btn.disabled = true;
            
            btn.innerHTML = `
                <span class="font-bold text-base ${isFull ? 'text-outline' : 'text-on-surface'}">${slot.time}</span>
                <span class="text-[10px] font-medium ${isFull ? 'text-outline' : 'text-primary'}">
                    ${isFull ? 'Hết chỗ' : slot.available + ' chỗ'}
                </span>
            `;
            
            btn.onclick = () => {
            // Xóa màu tất cả các nút giờ khác
            document.querySelectorAll('#morning-grid button, #afternoon-grid button').forEach(b => {
                b.classList.remove('ring-2', 'ring-primary');
            });
            // Thêm viền xanh cho nút vừa chọn
            btn.classList.add('ring-2', 'ring-primary');
                selectedTimeSlot = slot.time;
            };
            return btn;
        };

        // Đổ dữ liệu vào đúng "Ca"
        data["Sáng"].forEach(slot => morningGrid.appendChild(createButton(slot)));
        data["Chiều"].forEach(slot => afternoonGrid.appendChild(createButton(slot)));

    } catch (error) {
        console.error("Lỗi:", error);
    }
}
async function handleBooking(event) {
    event.preventDefault(); // Chặn việc load lại trang

    const phoneInput = document.querySelector('input[type="tel"]');
    const phone = phoneInput.value.trim();

    // 1. Kiểm tra Số điện thoại (Bắt buộc)
    if (!phone) {
        alert("Vui lòng nhập số điện thoại để nhà trường liên lạc!");
        phoneInput.focus();
        return;
    }

    // 2. Kiểm tra Khung giờ (Không bắt buộc nhưng có cảnh báo)
    if (!selectedTimeSlot) {
        const confirmEmpty = confirm("Bạn chưa chọn khung giờ gội đầu. Bạn vẫn muốn tiếp tục đặt lịch chứ?");
        if (!confirmEmpty) return;
    }

    // 3. Tiến hành gửi dữ liệu
    const submitBtn = event.target.querySelector('button[type="submit"]');
    submitBtn.disabled = true;
    submitBtn.innerText = "Đang xử lý...";

    const payload = {
        date: currentSelectedDate,
        slot: selectedTimeSlot || "Chưa chọn",
        phone: phone
    };

    try {
        const response = await fetch(SCRIPT_URL, {
            method: 'POST',
            mode: 'no-cors', // Dùng no-cors cho Google Apps Script
            cache: 'no-cache',
            body: JSON.stringify(payload)
        });

        // Với no-cors, ta không đọc được response trả về, 
        // nhưng nếu không nhảy vào catch là đã gửi thành công
        alert("Hệ thống ghi nhận lịch hẹn, bạn vui lòng sắp xếp thời gian xuống salon vào trước khung giờ khoảng 5 phút. Xin cảm ơn!");
        
        // Reset form
        phoneInput.value = "";
        selectedTimeSlot = "";
        fetchAndRenderSlots(currentSelectedDate); // Load lại số chỗ trống

    } catch (error) {
        alert("Có lỗi xảy ra, vui lòng thử lại sau!");
        console.error(error);
    } finally {
        submitBtn.disabled = false;
        submitBtn.innerText = "Đặt lịch";
    }
}

// Gán hàm vào Form
document.querySelector('form').onsubmit = handleBooking;

</script>
